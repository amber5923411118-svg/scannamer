<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公文自動命名</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f0f0f;
    font-family: 'Noto Serif TC', 'Georgia', serif;
    color: #e8e0d4;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 60px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 6px;
    color: #8b7355;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }

  h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 300;
    letter-spacing: 2px;
    color: #e8e0d4;
    text-align: center;
    line-height: 1.2;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #8b7355;
    margin: 16px auto 32px;
  }

  .api-section {
    width: 100%;
    max-width: 520px;
    margin-bottom: 28px;
  }

  .api-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #6b5d4e;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-input {
    flex: 1;
    padding: 11px 14px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    color: #e8e0d4;
    font-size: 12px;
    font-family: monospace;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.3s;
  }
  .api-input:focus { border-color: #8b7355; }
  .api-input.saved { border-color: #2a4a2a; }

  .btn-save-key {
    padding: 11px 18px;
    background: #1a1a1a;
    color: #8b7355;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.3s;
  }
  .btn-save-key.saved { color: #4ade80; border-color: #2a4a2a; background: #1e2a1e; }

  .api-hint {
    font-size: 11px;
    color: #3a3028;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .upload-zone {
    width: 100%;
    max-width: 520px;
    min-height: 200px;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    cursor: pointer;
    background: #141414;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 24px;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover { border-color: #3a3028; }
  .upload-zone.has-image { min-height: auto; padding: 0; }

  .upload-zone img {
    width: 100%;
    max-height: 420px;
    object-fit: contain;
    display: block;
    background: #1a1a1a;
  }

  .upload-icon {
    width: 48px;
    height: 48px;
    border: 1px solid #3a3028;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .upload-hint { color: #6b5d4e; font-size: 14px; letter-spacing: 1px; }
  .upload-hint2 { color: #3a3028; font-size: 11px; }

  input[type=file] { display: none; }

  .btn-analyze {
    margin-top: 20px;
    padding: 14px 40px;
    background: #c9a96e;
    color: #0f0f0f;
    border: none;
    border-radius: 2px;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.3s;
    min-width: 160px;
    display: none;
  }

  .btn-analyze:disabled {
    background: #1a1a1a;
    color: #4a4a4a;
    cursor: not-allowed;
  }

  .btn-analyze.visible { display: block; }

  .dots {
    margin-top: 24px;
    display: none;
    gap: 6px;
    align-items: center;
  }
  .dots.visible { display: flex; }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #8b7355;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  .result-box {
    margin-top: 32px;
    width: 100%;
    max-width: 520px;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    background: #141414;
    display: none;
  }
  .result-box.visible { display: block; }

  .result-hero {
    padding: 24px;
    border-bottom: 1px solid #1e1e1e;
    background: #111;
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: #6b5d4e;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .filename-text {
    font-size: clamp(13px, 2.5vw, 15px);
    color: #e8e0d4;
    word-break: break-all;
    line-height: 1.7;
  }

  .details { padding: 20px 24px; }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid #1e1e1e;
    gap: 16px;
  }

  .detail-key {
    font-size: 11px;
    color: #6b5d4e;
    letter-spacing: 1px;
    white-space: nowrap;
    padding-top: 1px;
  }

  .detail-val {
    font-size: 13px;
    color: #b8a898;
    text-align: right;
  }

  .confidence-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
  }

  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .badge.high { color: #4ade80; background: rgba(74,222,128,0.1); }
  .badge.medium { color: #fbbf24; background: rgba(251,191,36,0.1); }
  .badge.low { color: #f87171; background: rgba(248,113,113,0.1); }

  .note-box {
    margin-top: 14px;
    padding: 10px 14px;
    background: #1a1612;
    border-left: 2px solid #3a3028;
    font-size: 12px;
    color: #8b7355;
    line-height: 1.6;
  }

  .copy-area { padding: 0 24px 24px; }

  .btn-copy {
    width: 100%;
    padding: 12px;
    background: #1a1a1a;
    color: #8b7355;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
  }

  .btn-copy.copied {
    background: #1e2a1e;
    color: #4ade80;
    border-color: #2a4a2a;
  }

  .btn-reset {
    margin-top: 16px;
    background: none;
    border: none;
    color: #3a3028;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
    display: none;
  }
  .btn-reset.visible { display: block; }

  .error-box {
    margin-top: 24px;
    padding: 16px 20px;
    border: 1px solid #3a1a1a;
    border-radius: 4px;
    color: #f87171;
    font-size: 13px;
    max-width: 520px;
    width: 100%;
    background: #1a0f0f;
    display: none;
  }
  .error-box.visible { display: block; }
</style>
</head>
<body>

<div class="subtitle">Document · Intelligence</div>
<h1>公文自動命名</h1>
<div class="divider"></div>

<div class="api-section">
  <div class="api-label">Gemini API 金鑰（API Key）</div>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKeyInput" placeholder="貼上你的 Gemini API 金鑰">
    <button class="btn-save-key" id="btnSaveKey" onclick="saveKey()">儲存</button>
  </div>
  <div class="api-hint">金鑰只存在你的瀏覽器，不會上傳到任何地方</div>
</div>

<label class="upload-zone" id="uploadZone" for="fileInput">
  <div class="upload-icon">📄</div>
  <div class="upload-hint">點擊上傳文件圖片</div>
  <div class="upload-hint2">JPG · PNG · HEIC</div>
  <img id="preview" src="" alt="預覽" style="display:none;">
</label>
<input type="file" id="fileInput" accept="image/*">

<button class="btn-analyze" id="btnAnalyze" onclick="analyze()">分析文件</button>

<div class="dots" id="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<div class="result-box" id="resultBox">
  <div class="result-hero">
    <div class="result-label">建議檔名</div>
    <div class="filename-text" id="filenameText"></div>
  </div>
  <div class="details">
    <div class="detail-row">
      <span class="detail-key">文件日期</span>
      <span class="detail-val" id="detDate"></span>
    </div>
    <div class="detail-row">
      <span class="detail-key">內容摘要</span>
      <span class="detail-val" id="detSubject"></span>
    </div>
    <div class="confidence-row">
      <span class="detail-key">辨識信心</span>
      <span class="badge" id="confidenceBadge"></span>
    </div>
    <div class="note-box" id="noteBox" style="display:none;"></div>
  </div>
  <div class="copy-area">
    <button class="btn-copy" id="btnCopy" onclick="copyFilename()">複製檔名</button>
  </div>
</div>

<div class="error-box" id="errorBox"></div>

<button class="btn-reset" id="btnReset" onclick="reset()">重新上傳</button>

<script>
  let currentFilename = '';
  let imageBase64 = null;
  let imageMediaType = null;

  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const preview = document.getElementById('preview');
  const btnAnalyze = document.getElementById('btnAnalyze');
  const dots = document.getElementById('dots');
  const resultBox = document.getElementById('resultBox');
  const errorBox = document.getElementById('errorBox');
  const btnReset = document.getElementById('btnReset');
  const apiKeyInput = document.getElementById('apiKeyInput');

  const savedKey = localStorage.getItem('gemini_api_key');
  if (savedKey) {
    apiKeyInput.value = savedKey;
    apiKeyInput.classList.add('saved');
    document.getElementById('btnSaveKey').textContent = '✓ 已儲存';
    document.getElementById('btnSaveKey').classList.add('saved');
  }

  function saveKey() {
    const key = apiKeyInput.value.trim();
    if (!key) return;
    localStorage.setItem('gemini_api_key', key);
    apiKeyInput.classList.add('saved');
    const btn = document.getElementById('btnSaveKey');
    btn.textContent = '✓ 已儲存';
    btn.classList.add('saved');
  }

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    preview.src = url;
    preview.style.display = 'block';
    uploadZone.querySelector('.upload-icon').style.display = 'none';
    uploadZone.querySelector('.upload-hint').style.display = 'none';
    uploadZone.querySelector('.upload-hint2').style.display = 'none';
    uploadZone.classList.add('has-image');
    btnAnalyze.classList.add('visible');
    btnReset.classList.add('visible');
    resultBox.classList.remove('visible');
    errorBox.classList.remove('visible');

    const reader = new FileReader();
    reader.onload = (ev) => {
      imageBase64 = ev.target.result.split(',')[1];
      imageMediaType = file.type;
    };
    reader.readAsDataURL(file);
  });

  async function analyze() {
    const apiKey = localStorage.getItem('gemini_api_key') || apiKeyInput.value.trim();
    if (!apiKey) {
      errorBox.textContent = '請先輸入並儲存 Gemini API 金鑰。';
      errorBox.classList.add('visible');
      return;
    }
    if (!imageBase64) return;

    btnAnalyze.disabled = true;
    dots.classList.add('visible');
    resultBox.classList.remove('visible');
    errorBox.classList.remove('visible');

    const prompt = `你是一個文件命名助理。請分析這份文件圖片，擷取以下資訊並回傳 JSON：
- 文件日期（民國年格式 YYYMMDD，例如 1140523，找不到填「未知」）
- 內容摘要（最核心的4-8個字描述文件主題）
- 組合檔名格式：日期_內容摘要

只回傳 JSON，不要有其他文字：
{
  "date": "民國日期或未知",
  "subject": "內容摘要",
  "filename": "日期_內容摘要",
  "confidence": "high/medium/low",
  "note": "備註或空字串"
}`;

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { inline_data: { mime_type: imageMediaType, data: imageBase64 } },
                { text: prompt }
              ]
            }],
            generationConfig: { temperature: 0.1 }
          })
        }
      );

      const data = await response.json();

      if (data.error) throw new Error(data.error.message);

      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      currentFilename = parsed.filename + '.pdf';
      document.getElementById('filenameText').textContent = currentFilename;
      document.getElementById('detDate').textContent = parsed.date;
      document.getElementById('detSubject').textContent = parsed.subject;

      const badge = document.getElementById('confidenceBadge');
      const labels = { high: '高', medium: '中', low: '低' };
      badge.textContent = labels[parsed.confidence] || parsed.confidence;
      badge.className = 'badge ' + (parsed.confidence || 'medium');

      const noteBox = document.getElementById('noteBox');
      if (parsed.note) {
        noteBox.textContent = parsed.note;
        noteBox.style.display = 'block';
      } else {
        noteBox.style.display = 'none';
      }

      resultBox.classList.add('visible');
    } catch (err) {
      errorBox.textContent = '辨識失敗：' + (err.message || '請確認 API 金鑰是否正確，以及圖片是否清晰。');
      errorBox.classList.add('visible');
    }

    dots.classList.remove('visible');
    btnAnalyze.disabled = false;
  }

  function copyFilename() {
    if (!currentFilename) return;
    navigator.clipboard.writeText(currentFilename).then(() => {
      const btn = document.getElementById('btnCopy');
      btn.textContent = '✓ 已複製';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '複製檔名';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function reset() {
    fileInput.value = '';
    preview.src = '';
    preview.style.display = 'none';
    uploadZone.querySelector('.upload-icon').style.display = 'flex';
    uploadZone.querySelector('.upload-hint').style.display = 'block';
    uploadZone.querySelector('.upload-hint2').style.display = 'block';
    uploadZone.classList.remove('has-image');
    btnAnalyze.classList.remove('visible');
    btnReset.classList.remove('visible');
    resultBox.classList.remove('visible');
    errorBox.classList.remove('visible');
    imageBase64 = null;
    imageMediaType = null;
    currentFilename = '';
  }
</script>
</body>
</html>
